name: Benchmark integrity

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked --dev
      - run: uv run python scripts/render_benchmark.py
      - run: git diff --exit-code benchmarks/leaderboard.svg benchmarks/leaderboard.md
      - run: uv run pytest -q
